<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
{% load static %}
<title>SuperDev CRM {% block title %}{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
:root {
  --bg: #0c0e14;
  --surface: #13151f;
  --surface2: #1a1d2b;
  --surface3: #1f2235;
  --border: #252840;
  --border2: #2e3250;
  --accent: #6366f1;
  --accent-light: #818cf8;
  --accent-glow: rgba(99,102,241,0.15);
  --success: #22c55e;
  --danger: #ef4444;
  --warn: #f59e0b;
  --info: #3b82f6;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --text3: #64748b;
  --mono: 'JetBrains Mono', monospace;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 14px; }
body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; -webkit-font-smoothing: antialiased; }

/* LAYOUT */
.layout { display: flex; min-height: 100vh; }

/* SIDEBAR */
.sidebar {
  width: 220px; min-height: 100vh; background: var(--surface);
  border-right: 1px solid var(--border); padding: 20px 12px;
  display: flex; flex-direction: column; position: fixed;
  top: 0; left: 0; z-index: 100; gap: 2px;
}
.logo {
  font-size: 1.05rem; font-weight: 800; color: var(--text);
  padding: 6px 10px 20px; letter-spacing: -0.3px; display: flex; align-items: center; gap: 8px;
}
.logo-icon { width: 28px; height: 28px; background: var(--accent); border-radius: 7px; display: flex; align-items: center; justify-content: center; font-size: 0.85rem; flex-shrink: 0; }
.logo span { color: var(--accent-light); }
.nav-link {
  display: flex; align-items: center; gap: 9px; padding: 8px 10px;
  border-radius: 7px; color: var(--text2); text-decoration: none;
  font-size: 0.84rem; font-weight: 500; transition: all .15s; letter-spacing: -0.1px;
}
.nav-link:hover { background: var(--surface2); color: var(--text); }
.nav-link.active { background: var(--accent-glow); color: var(--accent-light); }
.nav-link .ni { font-size: 0.9rem; width: 16px; text-align: center; flex-shrink: 0; }
.nav-section { font-size: 0.68rem; color: var(--text3); padding: 14px 10px 4px; text-transform: uppercase; letter-spacing: 1.2px; font-weight: 600; }
.sidebar-footer { margin-top: auto; padding-top: 16px; border-top: 1px solid var(--border); }
.sidebar-footer-text { font-size: 0.72rem; color: var(--text3); padding: 6px 10px; line-height: 1.6; }

/* MAIN */
.main { margin-left: 220px; flex: 1; padding: 28px 32px; max-width: calc(100vw - 220px); }
.topbar { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 24px; gap: 16px; }
.page-title { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.5px; }
.page-sub { color: var(--text3); font-size: 0.82rem; margin-top: 3px; }
.topbar-actions { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

/* CARDS */
.card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: 10px; padding: 20px;
}
.card-title { font-size: 0.82rem; font-weight: 600; color: var(--text2); letter-spacing: -0.1px; margin-bottom: 14px; display: flex; align-items: center; gap: 7px; }

/* GRIDS */
.grid-4 { display: grid; grid-template-columns: repeat(4,1fr); gap: 14px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,1fr); gap: 14px; }
.grid-2 { display: grid; grid-template-columns: repeat(2,1fr); gap: 16px; }
.grid-2-1 { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; }

/* KPI CARD */
.kpi { padding: 16px 18px; }
.kpi-label { font-size: 0.72rem; color: var(--text3); text-transform: uppercase; letter-spacing: .9px; font-weight: 600; margin-bottom: 8px; }
.kpi-value { font-size: 1.75rem; font-weight: 800; letter-spacing: -1px; line-height: 1; }
.kpi-sub { font-size: 0.75rem; color: var(--text3); margin-top: 5px; }
.kpi-icon { float: right; font-size: 1.3rem; margin-top: -2px; opacity: 0.7; }

/* BADGES */
.badge {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 8px; border-radius: 5px; font-size: 0.7rem; font-weight: 600; letter-spacing: 0.2px;
}
.badge-red    { background: rgba(239,68,68,.12);  color: #f87171; border: 1px solid rgba(239,68,68,.2); }
.badge-yellow { background: rgba(245,158,11,.12); color: #fbbf24; border: 1px solid rgba(245,158,11,.2); }
.badge-green  { background: rgba(34,197,94,.12);  color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
.badge-blue   { background: rgba(59,130,246,.12); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
.badge-purple { background: rgba(99,102,241,.12); color: #a5b4fc; border: 1px solid rgba(99,102,241,.2); }
.badge-gray   { background: rgba(100,116,139,.12);color: #94a3b8; border: 1px solid rgba(100,116,139,.2); }

/* DOT STATUS */
.dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; flex-shrink: 0; }
.dot-red    { background: var(--danger);  box-shadow: 0 0 5px var(--danger); }
.dot-yellow { background: var(--warn);    box-shadow: 0 0 5px var(--warn); }
.dot-green  { background: var(--success); box-shadow: 0 0 5px var(--success); }

/* BUTTONS */
.btn {
  display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px;
  border-radius: 7px; font-size: 0.8rem; font-weight: 600; cursor: pointer;
  border: none; transition: all .15s; font-family: 'Inter', sans-serif;
  text-decoration: none; letter-spacing: -0.1px; white-space: nowrap;
}
.btn-primary  { background: var(--accent); color: #fff; }
.btn-primary:hover  { background: #5558e8; }
.btn-danger   { background: rgba(239,68,68,.1); color: #f87171; border: 1px solid rgba(239,68,68,.2); }
.btn-danger:hover   { background: rgba(239,68,68,.2); }
.btn-outline  { background: transparent; color: var(--text2); border: 1px solid var(--border2); }
.btn-outline:hover  { border-color: var(--accent); color: var(--accent-light); }
.btn-blue     { background: rgba(59,130,246,.1); color: #60a5fa; border: 1px solid rgba(59,130,246,.2); }
.btn-blue:hover     { background: rgba(59,130,246,.2); }
.btn-green    { background: rgba(34,197,94,.1);  color: #4ade80; border: 1px solid rgba(34,197,94,.2); }
.btn-green:hover    { background: rgba(34,197,94,.2); }
.btn-sm { padding: 5px 10px; font-size: 0.75rem; }
.btn-xs { padding: 3px 8px; font-size: 0.7rem; border-radius: 5px; }

/* AVATAR */
.avatar {
  width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center;
  justify-content: center; font-size: 0.78rem; font-weight: 700; flex-shrink: 0;
}
.av-red    { background: rgba(239,68,68,.15);  color: #f87171; }
.av-yellow { background: rgba(245,158,11,.15); color: #fbbf24; }
.av-green  { background: rgba(34,197,94,.15);  color: #4ade80; }
.av-blue   { background: rgba(59,130,246,.15); color: #60a5fa; }
.av-purple { background: rgba(99,102,241,.15); color: #a5b4fc; }

/* INPUTS */
.input-field {
  background: var(--surface2); border: 1px solid var(--border2); color: var(--text);
  border-radius: 7px; padding: 7px 12px; font-size: 0.82rem; outline: none;
  font-family: 'Inter', sans-serif; transition: border-color .15s;
}
.input-field:focus { border-color: var(--accent); }
select.input-field { cursor: pointer; }

/* CHIP */
.chip {
  display: inline-block; font-size: 0.7rem; padding: 2px 7px; border-radius: 4px;
  background: var(--surface2); color: var(--text2); border: 1px solid var(--border); font-weight: 500;
}

/* DIVIDER */
hr.divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

/* TABLE BASE (para notif) */
.table-wrap { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
th { color: var(--text3); font-size: 0.7rem; text-transform: uppercase; letter-spacing: .9px; padding: 9px 12px; text-align: left; border-bottom: 1px solid var(--border); font-weight: 600; }
td { padding: 10px 12px; border-bottom: 1px solid rgba(37,40,64,0.5); vertical-align: middle; }
tr:hover td { background: rgba(255,255,255,0.015); }
tr:last-child td { border-bottom: none; }

/* DATA GRID */
.dg-wrap { overflow-x: auto; border-radius: 8px; border: 1px solid var(--border); }
.dg { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
.dg thead { position: sticky; top: 0; z-index: 2; }
.dg th {
  background: var(--surface2); color: var(--text3); font-size: 0.7rem;
  text-transform: uppercase; letter-spacing: .9px; padding: 10px 14px;
  text-align: left; border-bottom: 1px solid var(--border); font-weight: 600;
  white-space: nowrap; user-select: none;
}
.dg th.sortable { cursor: pointer; }
.dg th.sortable:hover { color: var(--text); }
.dg th .sort-icon { margin-left: 5px; opacity: 0.4; font-size: 0.75rem; }
.dg th.sort-asc .sort-icon::after  { content: ' ↑'; opacity: 1; color: var(--accent-light); }
.dg th.sort-desc .sort-icon::after { content: ' ↓'; opacity: 1; color: var(--accent-light); }
.dg th:not(.sort-asc):not(.sort-desc) .sort-icon::after { content: ' ↕'; }
.dg td { padding: 10px 14px; border-bottom: 1px solid rgba(37,40,64,0.5); vertical-align: middle; }
.dg tr:hover td { background: rgba(99,102,241,0.04); }
.dg tr:last-child td { border-bottom: none; }
.dg-empty { text-align: center; color: var(--text3); padding: 48px !important; }

/* TOAST */
.toast-container { position: fixed; top: 20px; right: 20px; z-index: 999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
.toast {
  background: var(--surface2); border: 1px solid var(--border2); border-radius: 9px;
  padding: 12px 16px; min-width: 280px; max-width: 360px;
  box-shadow: 0 8px 32px rgba(0,0,0,.5); animation: tIn .25s ease;
  font-size: 0.82rem; pointer-events: all;
}
@keyframes tIn  { from { transform: translateX(110%); opacity:0; } to { transform: translateX(0); opacity:1; } }
@keyframes tOut { from { transform: translateX(0); opacity:1; } to { transform: translateX(110%); opacity:0; } }
.toast-head { font-weight: 700; margin-bottom: 4px; display: flex; justify-content: space-between; align-items: center; }
.toast-x { cursor: pointer; color: var(--text3); font-size: 1rem; line-height: 1; }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,.75); z-index: 200; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal-box { background: var(--surface); border: 1px solid var(--border2); border-radius: 12px; padding: 24px; max-width: 700px; width: 100%; max-height: 85vh; overflow-y: auto; }
.modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
.modal-head h3 { font-size: 1.05rem; font-weight: 700; letter-spacing: -0.3px; }
.modal-x { cursor: pointer; font-size: 1.3rem; color: var(--text3); line-height: 1; }

/* NOTIF ITEM */
.notif-item { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 12px 14px; }
.notif-item + .notif-item { margin-top: 8px; }
.notif-item-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }

/* SCROLLBAR */
::-webkit-scrollbar { width: 5px; height: 5px; }
::-webkit-scrollbar-track { background: transparent; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 3px; }

@media (max-width: 860px) {
  .sidebar { display: none; }
  .main { margin-left: 0; padding: 16px; max-width: 100vw; }
  .grid-4, .grid-3 { grid-template-columns: repeat(2,1fr); }
  .grid-2, .grid-2-1 { grid-template-columns: 1fr; }
}
</style>
</head>
<body>
{% csrf_token %}
<div class="layout">
<nav class="sidebar">
  <div class="logo"><div class="logo-icon">🛒</div>Super<span>Dev</span></div>
  <a href="/"          class="nav-link {% block nav_dash %}{% endblock %}"><span class="ni">📊</span>Dashboard</a>
  <div class="nav-section">Clientes</div>
  <a href="/clientes/" class="nav-link {% block nav_list %}{% endblock %}"><span class="ni">👥</span>Todos os Clientes</a>
  <a href="/clientes/?perfil=ex_fiel"                 class="nav-link"><span class="ni">🔴</span>Ex-Fiéis</a>
  <a href="/clientes/?perfil=vegetariano_incompleto"  class="nav-link"><span class="ni">🟡</span>Cross-Sell</a>
  <a href="/clientes/?perfil=habitos_previsiveis"     class="nav-link"><span class="ni">🍼</span>Perfil Bebê</a>
  <a href="/clientes/?perfil=novo" class="nav-link"><span class="ni">🆕</span>Novos</a>
  <a href="/clientes/?perfil=ativo" class="nav-link"><span class="ni">👋🏼</span>Ativos</a>
  <div class="nav-section">Automação</div>
  <a href="/notificacoes/" class="nav-link {% block nav_notif %}{% endblock %}"><span class="ni">🔔</span>Notificações</a>
  <div class="sidebar-footer">
    <div class="sidebar-footer-text">SuperDev CRM · ADS<br><span style="color:var(--accent-light)">v2.0</span></div>
  </div>
</nav>
<main class="main">{% block content %}{% endblock %}</main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script>
// CSRF via hidden input (mais robusto que cookie)
function getCsrf() {
  const el = document.querySelector('[name=csrfmiddlewaretoken]');
  if (el) return el.value;
  return document.cookie.split(';').map(c=>c.trim()).find(c=>c.startsWith('csrftoken='))?.split('=')[1] || '';
}

function showToast(title, body, type='success') {
  const palette = { success:'#22c55e', error:'#ef4444', info:'#3b82f6', warn:'#f59e0b' };
  const t = document.createElement('div');
  t.className = 'toast';
  t.style.borderLeft = '3px solid ' + (palette[type]||palette.success);
  t.innerHTML = `<div class="toast-head"><span>${title}</span><span class="toast-x" onclick="this.closest('.toast').remove()">×</span></div><div style="color:var(--text2);line-height:1.4;">${body}</div>`;
  document.getElementById('toastContainer').appendChild(t);
  setTimeout(()=>{ t.style.animation='tOut .25s ease forwards'; setTimeout(()=>t.remove(),250); }, 5000);
}

// ── Data Grid sorter ──────────────────────────────────────────────
function initDataGrid(tableId) {
  const tbl = document.getElementById(tableId);
  if (!tbl) return;
  const headers = tbl.querySelectorAll('th.sortable');
  headers.forEach(th => {
    th.innerHTML += '<span class="sort-icon"></span>';
    th.addEventListener('click', () => {
      const col = +th.dataset.col;
      const asc = th.classList.contains('sort-asc');
      headers.forEach(h => h.classList.remove('sort-asc','sort-desc'));
      th.classList.add(asc ? 'sort-desc' : 'sort-asc');
      const tbody = tbl.querySelector('tbody');
      const rows = Array.from(tbody.querySelectorAll('tr'));
      rows.sort((a,b) => {
        const av = a.cells[col]?.dataset.val ?? a.cells[col]?.textContent.trim() ?? '';
        const bv = b.cells[col]?.dataset.val ?? b.cells[col]?.textContent.trim() ?? '';
        const an = parseFloat(av), bn = parseFloat(bv);
        const cmp = isNaN(an)||isNaN(bn) ? av.localeCompare(bv,'pt') : an - bn;
        return asc ? -cmp : cmp;
      });
      rows.forEach(r => tbody.appendChild(r));
    });
  });
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
